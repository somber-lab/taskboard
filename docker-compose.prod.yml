services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-taskboard}
      POSTGRES_USER: ${POSTGRES_USER:-taskboard}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?required}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-taskboard}"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    image: ghcr.io/somber-lab/taskboard-backend:latest
    pull_policy: always
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-taskboard}:${POSTGRES_PASSWORD:?required}@db:5432/${POSTGRES_DB:-taskboard}
      PORT: 3000
      ALLOWED_ORIGIN: ${ALLOWED_ORIGIN:?required}
    depends_on:
      db:
        condition: service_healthy

  frontend:
    image: ghcr.io/somber-lab/taskboard-frontend:latest
    pull_policy: always
    restart: unless-stopped
    ports:
      - "${PORT:-80}:80"
    depends_on:
      - backend

volumes:
  postgres_data:
